<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sanad AI EOI" />
    <title>Sanad AI EOI</title>
    <!-- SANAD_FAVICON_START -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <!-- SANAD_FAVICON_END -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const key = "sanad-eoi.theme";
        const darkThemeColor = "#18181b";
        const lightThemeColor = "#ffffff";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "dark";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <style>
      #sanad-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease-out;
      }
      .dark #sanad-splash { background: #18181b; }
      :not(.dark) #sanad-splash { background: #ffffff; }
      #sanad-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #sanad-splash svg {
        animation: sanad-pulse 1.5s ease-in-out infinite;
      }
      #sanad-splash .sanad-sparkle {
        animation: sanad-sparkle-rotate 2s linear infinite;
        transform-origin: 20px 5.9px;
      }
      #sanad-splash .sanad-brand {
        margin-top: 20px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 1px;
        opacity: 0.9;
      }
      #sanad-splash .sanad-tagline {
        margin-top: 8px;
        font-family: 'Caveat', cursive;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.5px;
        opacity: 0.6;
      }
      .dark #sanad-splash .sanad-brand { color: #fafafa; }
      :not(.dark) #sanad-splash .sanad-brand { color: #18181b; }
      .dark #sanad-splash .sanad-tagline { color: #a1a1aa; }
      :not(.dark) #sanad-splash .sanad-tagline { color: #71717a; }
      .dark #sanad-splash .sanad-letter { fill: #fafafa; }
      :not(.dark) #sanad-splash .sanad-letter { fill: #18181b; }
      .dark #sanad-splash .sanad-sparkle-path { fill: #fafafa; }
      :not(.dark) #sanad-splash .sanad-sparkle-path { fill: #18181b; }
      @keyframes sanad-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.85; }
      }
      @keyframes sanad-sparkle-rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by React on mount -->
    <div id="sanad-splash">
      <svg viewBox="0 0 24 24" fill="none" width="64" height="64">
        <text class="sanad-letter" x="11.5" y="18.5" text-anchor="middle"
          font-family="system-ui,-apple-system,sans-serif" font-weight="900"
          font-size="19" letter-spacing="-0.5">S</text>
        <g class="sanad-sparkle">
          <path class="sanad-sparkle-path"
            d="M20 3.5 L20.6 5.3 L22.4 5.9 L20.6 6.5 L20 8.3 L19.4 6.5 L17.6 5.9 L19.4 5.3Z"
            opacity="0.75"/>
        </g>
      </svg>
      <div class="sanad-brand">Sanad AI</div>
      <div class="sanad-tagline">Your Enterprise Operations, In Hand</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
