services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - paperclip-internal

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      SANAD_BRAIN_URL: "${SANAD_BRAIN_URL:-}"
      SANAD_BRAIN_API_KEY: "${SANAD_BRAIN_API_KEY:-}"
      PAPERCLIP_MEDIA_WORKER_URL: "http://paperclip-media-worker:3200"
      PAPERCLIP_STORAGE_PROVIDER: "s3"
      PAPERCLIP_STORAGE_S3_ENDPOINT: "http://minio:9000"
      PAPERCLIP_STORAGE_S3_BUCKET: "paperclip-files"
      PAPERCLIP_STORAGE_S3_REGION: "us-east-1"
      PAPERCLIP_STORAGE_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY:-paperclip-minio}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}"
    volumes:
      - paperclip-data:/paperclip
      - /home/eslam/optiflow:/workspace:rw
      - /home/eslam/data/projects/sanad-brain-mcp:/home/eslam/data/projects/sanad-brain-mcp:ro
      - /home/eslam/data/projects/paperclip/skills:/workspace/skills:ro
      - /home/eslam/data/projects/paperclip/plugins:/workspace/plugins:ro
      - /home/eslam/data/projects/paperclip/mcp-servers:/workspace/mcp-servers:ro
      - /home/eslam/.npm:/home/eslam/.npm:ro
    depends_on:
      db:
        condition: service_healthy
      media-worker:
        condition: service_healthy
    networks:
      - paperclip-internal

  minio:
    image: minio/minio:latest
    container_name: paperclip-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-paperclip-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - paperclip-internal

  media-worker:
    build: ./docker/media-worker
    container_name: paperclip-media-worker
    restart: unless-stopped
    environment:
      - PORT=3200
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=paperclip-files
      - ALLOWED_STORAGE_HOST=minio
    volumes:
      - /workspace:/workspace:ro
    expose:
      - "3200"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3200/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - paperclip-internal

networks:
  paperclip-internal:
    driver: bridge

volumes:
  pgdata:
  paperclip-data:
  minio-data:
