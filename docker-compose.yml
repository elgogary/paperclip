    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
      media-worker:
        condition: service_healthy
    networks:
      - paperclip-internal

  media-worker:
    build: ./docker/media-worker
    container_name: paperclip-media-worker
    restart: unless-stopped
    environment:
      - PORT=3200
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=paperclip-files
      - ALLOWED_STORAGE_HOST=minio
    volumes:
      - /workspace:/workspace:ro
    expose:
      - "3200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3200/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - paperclip-internal

networks:
  paperclip-internal:
    driver: bridge

volumes:
  pgdata:
  paperclip-data:
